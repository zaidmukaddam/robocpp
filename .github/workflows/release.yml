name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Tag matches rbcpp version
        shell: bash
        run: |
          version="$(cargo pkgid -p rbcpp_cli | sed 's/.*#//')"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match rbcpp_cli version ${version}" >&2
            exit 1
          fi
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Validate production-readiness corpus
        run: cargo run -p xtask -- validate-corpus
      - name: Validate generated differential suite
        run: cargo run -p xtask -- validate-differential
      - name: Validate robustness limits
        run: cargo run -p xtask -- validate-robustness
      - name: Validate generated C sanitizers
        run: cargo run -p xtask -- validate-sanitizers
      - name: Fuzz smoke
        run: cargo run -p xtask -- fuzz-smoke

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build rbcpp
        run: cargo build --locked --release -p rbcpp_cli --bin rbcpp
      - name: Smoke test rbcpp
        shell: bash
        run: |
          bin="target/release/rbcpp"
          if [ "$RUNNER_OS" = "Windows" ]; then
            bin="${bin}.exe"
          fi
          "$bin" --version
          "$bin" check examples/counter.st
      - name: Package rbcpp
        id: package
        shell: bash
        run: |
          set -euo pipefail
          host="$(rustc -vV | sed -n 's/^host: //p')"
          name="rbcpp-${GITHUB_REF_NAME}-${host}"
          bin="target/release/rbcpp"
          if [ "$RUNNER_OS" = "Windows" ]; then
            bin="${bin}.exe"
          fi
          mkdir -p "dist/${name}"
          cp "$bin" "dist/${name}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          echo "archive=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: rbcpp-${{ runner.os }}-${{ runner.arch }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/SHA256SUMS --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/SHA256SUMS --verify-tag --title "rbcpp ${GITHUB_REF_NAME}" --generate-notes
          fi
